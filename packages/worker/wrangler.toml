name = "portfolio-chatbot-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Lets `import background from "./background.txt"` pull in the raw file contents at build time.
[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = true

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "74fc714f778e41deb923a5eee865152a"

[vars]
ALLOWED_ORIGINS = "https://boneyp003.github.io,http://localhost:5173"
